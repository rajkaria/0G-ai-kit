title: "[RFC] "
labels: ["rfc"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph — what is this RFC proposing?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem are you solving? Who benefits?
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Design sketch
      description: API shape, CLI flags, file paths. Be specific.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: questions
    attributes:
      label: Open questions
